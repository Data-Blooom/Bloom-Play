<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BloomPlay</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
    --bg-primary: #0a0e1a;
    --bg-secondary: #111827;
    --bg-card: #0f1729;
    --bg-card-hover: #141f33;
    --border-color: #1a2840;
    --border-light: #233452;
    --text-primary: #ffffff;
    --text-secondary: #c8d0e0;
    --text-muted: #8a9bbd;
    
    --green: #22d3a7;
    --green-bg: rgba(34, 211, 167, 0.08);
    --yellow: #fbbf24;
    --yellow-bg: rgba(251, 191, 36, 0.08);
    --red: #f87171;
    --red-bg: rgba(248, 113, 113, 0.08);
    --blue: #60a5fa;
    --blue-bg: rgba(96, 165, 250, 0.08);
    --purple: #a78bfa;
    --purple-bg: rgba(167, 139, 250, 0.08);
    --pink: #f472b6;
    --pink-bg: rgba(244, 114, 182, 0.08);
    --orange: #fb923c;
    --orange-bg: rgba(251, 146, 60, 0.08);
    --cyan: #22d3ee;
    --cyan-bg: rgba(34, 211, 238, 0.08);
    
    --radius: 12px;
    --shadow: 0 4px 24px rgba(0,0,0,0.5);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    min-height: 100dvh;
    padding: 12px;
    padding-bottom: calc(12px + var(--safe-bottom));
    background-image: 
        radial-gradient(ellipse at 20% 0%, rgba(34, 211, 167, 0.02) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(167, 139, 250, 0.02) 0%, transparent 60%);
    user-select: text;
    -webkit-user-select: text;
    overflow-x: hidden;
}

.container {
    max-width: 580px;
    margin: 0 auto;
    padding: 0 4px;
}

/* ===== HEADER ===== */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius);
    margin-bottom: 12px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
}

.logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 18px;
    font-weight: 900;
    background: linear-gradient(135deg, #22d3a7, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
}

.logo-icon {
    font-size: 22px;
    -webkit-text-fill-color: initial;
}

/* ===== STATUS BADGE ===== */
.status {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border-color);
    white-space: nowrap;
}

.status .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
    transition: all 0.3s ease;
}

.status.online {
    color: var(--green);
    border-color: rgba(34, 211, 167, 0.2);
}

.status.online .dot {
    background: var(--green);
    box-shadow: 0 0 8px rgba(34, 211, 167, 0.3);
}

.status.offline {
    color: var(--red);
    border-color: rgba(248, 113, 113, 0.15);
    background: rgba(248, 113, 113, 0.05);
}

.status.offline .dot {
    background: var(--red);
    box-shadow: 0 0 8px rgba(248, 113, 113, 0.2);
}

/* ===== NAV ===== */
.nav {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
    background: var(--bg-card);
    padding: 3px;
    border-radius: var(--radius);
    border: 1px solid var(--border-color);
}

.nav-btn {
    flex: 1;
    padding: 8px 10px;
    border: none;
    border-radius: 9px;
    background: transparent;
    color: var(--text-muted);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}

.nav-btn:active {
    transform: scale(0.96);
}

.nav-btn.active {
    background: var(--bg-card-hover);
    color: var(--text-primary);
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

.nav-btn.active-stats {
    background: rgba(34, 211, 167, 0.08);
    color: var(--green);
    border: 1px solid rgba(34, 211, 167, 0.1);
}

.nav-btn.active-hardware {
    background: rgba(167, 139, 250, 0.08);
    color: var(--purple);
    border: 1px solid rgba(167, 139, 250, 0.1);
}

/* ===== CARD ===== */
.card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    transition: all 0.3s ease;
}

.card-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 0.3px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.card-title .badge-count {
    font-size: 9px;
    font-weight: 600;
    color: var(--text-muted);
    background: rgba(255,255,255,0.04);
    padding: 2px 10px;
    border-radius: 999px;
    margin-left: auto;
    border: 1px solid rgba(255,255,255,0.04);
}

/* ===== STATS ===== */
.stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
}

.stat-item {
    background: rgba(0,0,0,0.2);
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.03);
    transition: border-color 0.3s ease;
}

.stat-item:active {
    transform: scale(0.98);
}

.stat-item.full {
    grid-column: 1 / -1;
}

.stat-label {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 3px;
}

.stat-value {
    font-size: 17px;
    font-weight: 800;
    color: var(--text-primary);
    line-height: 1.2;
}

.stat-value .unit {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-left: 2px;
}

.stat-bar {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
    margin-top: 5px;
    overflow: hidden;
}

.stat-bar .fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s ease;
}

.fill-green { background: var(--green); }
.fill-yellow { background: var(--yellow); }
.fill-red { background: var(--red); }
.fill-blue { background: var(--blue); }
.fill-purple { background: var(--purple); }
.fill-pink { background: var(--pink); }
.fill-orange { background: var(--orange); }
.fill-cyan { background: var(--cyan); }

/* ===== COLORS ===== */
.green { color: var(--green); }
.yellow { color: var(--yellow); }
.red { color: var(--red); }
.blue { color: var(--blue); }
.purple { color: var(--purple); }
.pink { color: var(--pink); }
.orange { color: var(--orange); }
.cyan { color: var(--cyan); }

/* ============================================================
   HARDWARE - MOBILE OPTIMIZED
   ============================================================ */
.hw-container {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.hw-group {
    background: rgba(0,0,0,0.15);
    border-radius: 10px;
    padding: 12px 14px;
    border: 1px solid rgba(255,255,255,0.04);
    transition: all 0.3s ease;
}

.hw-group:active {
    transform: scale(0.99);
}

.hw-group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
}

.hw-group-icon {
    font-size: 20px;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
}

.hw-group-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-primary);
    flex: 1;
}

.hw-group-tag {
    font-size: 8px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    color: var(--text-muted);
    flex-shrink: 0;
}

.hw-detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.02);
    gap: 8px;
}

.hw-detail-row:last-child {
    border-bottom: none;
}

.hw-detail-label {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 500;
    flex-shrink: 0;
}

.hw-detail-value {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-primary);
    text-align: right;
    word-break: break-word;
    flex: 1;
    min-width: 0;
}

/* Disk items */
.hw-disk-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 4px;
}

.hw-disk-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.03);
    flex-wrap: wrap;
}

.hw-disk-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-primary);
    min-width: 35px;
}

.hw-disk-bar-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 100px;
}

.hw-disk-bar {
    flex: 1;
    height: 5px;
    background: rgba(255,255,255,0.06);
    border-radius: 5px;
    overflow: hidden;
    min-width: 40px;
}

.hw-disk-bar .fill {
    height: 100%;
    border-radius: 5px;
    transition: width 0.3s ease;
}

.hw-disk-info {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-secondary);
    white-space: nowrap;
    min-width: 70px;
    text-align: right;
}

.hw-disk-detail {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 400;
}

/* ===== OFFLINE ===== */
.offline {
    text-align: center;
    padding: 30px 16px;
}

.offline .icon {
    font-size: 40px;
    margin-bottom: 10px;
    display: block;
}

.offline h3 {
    font-size: 17px;
    margin-bottom: 4px;
}

.offline p {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
}

/* ===== FOOTER ===== */
.footer {
    text-align: center;
    padding: 12px 0 4px;
    margin-top: 4px;
}

.footer a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 11px;
    font-weight: 500;
    transition: color 0.3s ease;
    -webkit-tap-highlight-color: transparent;
}

.footer a:active {
    color: var(--green);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 480px) {
    body {
        padding: 8px;
        padding-bottom: calc(8px + var(--safe-bottom));
    }
    
    .header {
        padding: 10px 14px;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 6px;
    }
    
    .logo {
        font-size: 16px;
        gap: 6px;
    }
    
    .logo-icon {
        font-size: 18px;
    }
    
    .status {
        font-size: 9px;
        padding: 3px 10px;
    }
    
    .nav-btn {
        font-size: 11px;
        padding: 7px 8px;
    }
    
    .card {
        padding: 12px;
        border-radius: 10px;
    }
    
    .stats {
        gap: 5px;
    }
    
    .stat-item {
        padding: 8px 10px;
    }
    
    .stat-value {
        font-size: 15px;
    }
    
    .stat-value .unit {
        font-size: 10px;
    }
    
    .stat-label {
        font-size: 8px;
    }
    
    .hw-group {
        padding: 10px 12px;
    }
    
    .hw-group-icon {
        width: 30px;
        height: 30px;
        font-size: 17px;
    }
    
    .hw-group-title {
        font-size: 12px;
    }
    
    .hw-detail-label {
        font-size: 11px;
    }
    
    .hw-detail-value {
        font-size: 11px;
    }
    
    .hw-disk-item {
        padding: 6px 8px;
        gap: 6px;
    }
    
    .hw-disk-name {
        font-size: 11px;
        min-width: 30px;
    }
    
    .hw-disk-info {
        font-size: 9px;
        min-width: 60px;
    }
    
    .hw-disk-bar-wrap {
        min-width: 80px;
    }
}

@media (max-width: 380px) {
    .header {
        flex-direction: column;
        align-items: stretch;
        text-align: center;
    }
    
    .logo {
        justify-content: center;
    }
    
    .status {
        justify-content: center;
    }
    
    .stats {
        grid-template-columns: 1fr;
    }
    
    .stat-item.full {
        grid-column: 1;
    }
    
    .nav-btn {
        font-size: 10px;
        padding: 6px 6px;
    }
    
    .hw-detail-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 2px;
    }
    
    .hw-detail-value {
        text-align: left;
        width: 100%;
    }
}

/* ===== TOUCH FEEDBACK ===== */
@media (hover: none) {
    .stat-item:active,
    .hw-group:active {
        background: rgba(255,255,255,0.03);
    }
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

/* ===== SAFE AREA ===== */
@supports (padding: max(0px)) {
    .container {
        padding-left: max(4px, env(safe-area-inset-left));
        padding-right: max(4px, env(safe-area-inset-right));
    }
}

/* ===== DARK MODE SUPPORT ===== */
@media (prefers-color-scheme: light) {
    :root {
        --bg-primary: #0a0e1a;
        --bg-secondary: #111827;
        --bg-card: #0f1729;
        --text-primary: #ffffff;
        --text-secondary: #c8d0e0;
        --text-muted: #8a9bbd;
    }
}

/* ===== SMOOTH TRANSITIONS ===== */
.card, .stat-item, .hw-group, .nav-btn {
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ===== LOADING SHIMMER ===== */
@keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
}

.loading {
    background: linear-gradient(90deg, 
        rgba(255,255,255,0.02) 25%, 
        rgba(255,255,255,0.05) 50%, 
        rgba(255,255,255,0.02) 75%
    );
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px;
    height: 16px;
    width: 100%;
}
</style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div class="logo">
            <span class="logo-icon">🌸</span> BloomPlay
        </div>
        <div id="status" class="status offline">
            <span class="dot"></span>
            <span id="statusText">Offline</span>
        </div>
    </div>

    <!-- NAV -->
    <div class="nav" id="nav">
        <button class="nav-btn active active-stats" data-view="stats">
            📊 Stats
        </button>
        <button class="nav-btn" data-view="hardware">
            💻 Hardware
        </button>
    </div>

    <!-- CONTENT -->
    <div id="content"></div>

    <!-- FOOTER -->
    <div class="footer">
        <a href="https://linktr.ee/Data_Bloom">🌸 Data Bloom</a>
    </div>

</div>

<script>
// ============================================================
// STATE
// ============================================================
let currentView = 'stats';
let updateInterval = null;

// ============================================================
// DOM REFS
// ============================================================
const content = document.getElementById('content');
const statusEl = document.getElementById('status');
const statusText = document.getElementById('statusText');
const navBtns = document.querySelectorAll('.nav-btn');

// ============================================================
// HELPERS
// ============================================================
function getColor(val, warn=70, crit=85) {
    val = Number(val);
    if (isNaN(val)) return '';
    if (val >= crit) return 'red';
    if (val >= warn) return 'yellow';
    return 'green';
}

function getFill(val, warn=70, crit=85) {
    val = Number(val);
    if (isNaN(val)) return 'fill-green';
    if (val >= crit) return 'fill-red';
    if (val >= warn) return 'fill-yellow';
    return 'fill-green';
}

function safeStr(val, fallback='—') {
    if (val === undefined || val === null || val === '') return fallback;
    if (typeof val === 'object') {
        try { return JSON.stringify(val); } catch { return '[Object]'; }
    }
    return String(val);
}

// ============================================================
// RENDER: STATS
// ============================================================
function renderStats(data) {
    const cpu = Number(data.cpu) || 0;
    const cpuTemp = Number(data.cpu_temp) || 0;
    
    const gpu = data.gpu || {};
    const gpuUsage = Number(gpu.usage) || 0;
    const gpuTemp = Number(gpu.temp) || 0;
    const vramUsed = Number(gpu.vram_used) || 0;
    const vramTotal = Number(gpu.vram_total) || 0;
    const vramPct = vramTotal > 0 ? (vramUsed / vramTotal * 100) : 0;
    
    const ram = data.ram || {};
    const ramUsed = Number(ram.used) || 0;
    const ramTotal = Number(ram.total) || 0;
    const ramPct = Number(ram.percent) || 0;
    
    const net = data.network || {};
    const down = Number(net.download) || 0;
    const up = Number(net.upload) || 0;
    const ping = Number(net.ping) || 0;
    
    const bat = data.battery || {};
    const batPct = Number(bat.percent) || 0;
    const batHealth = safeStr(bat.health, '—');

    return `
    <div class="card">
        <div class="card-title">
            📊 Live Statistics
            <span class="badge-count">${new Date().toLocaleTimeString()}</span>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">🖥 CPU</div>
                <div class="stat-value ${getColor(cpu)}">${cpu}<span class="unit">%</span></div>
                <div class="stat-bar"><div class="fill ${getFill(cpu)}" style="width:${cpu}%"></div></div>
            </div>
            
            <div class="stat-item">
                <div class="stat-label">🌡 CPU Temp</div>
                <div class="stat-value ${getColor(cpuTemp)}">${cpuTemp}<span class="unit">°C</span></div>
                <div class="stat-bar"><div class="fill ${getFill(cpuTemp)}" style="width:${Math.min(cpuTemp, 100)}%"></div></div>
            </div>
            
            <div class="stat-item">
                <div class="stat-label">🎮 GPU</div>
                <div class="stat-value ${getColor(gpuUsage)}">${gpuUsage}<span class="unit">%</span></div>
                <div class="stat-bar"><div class="fill ${getFill(gpuUsage)}" style="width:${gpuUsage}%"></div></div>
            </div>
            
            <div class="stat-item">
                <div class="stat-label">🌡 GPU Temp</div>
                <div class="stat-value ${getColor(gpuTemp)}">${gpuTemp}<span class="unit">°C</span></div>
                <div class="stat-bar"><div class="fill ${getFill(gpuTemp)}" style="width:${Math.min(gpuTemp, 100)}%"></div></div>
            </div>
            
            <div class="stat-item full">
                <div class="stat-label">💾 VRAM</div>
                <div class="stat-value blue">${vramUsed.toFixed(1)}<span class="unit">/ ${vramTotal.toFixed(1)} GB</span></div>
                <div class="stat-bar"><div class="fill fill-blue" style="width:${vramPct}%"></div></div>
            </div>
            
            <div class="stat-item full">
                <div class="stat-label">🧠 RAM</div>
                <div class="stat-value purple">${ramUsed.toFixed(1)}<span class="unit">/ ${ramTotal.toFixed(1)} GB</span></div>
                <div class="stat-bar"><div class="fill ${getFill(ramPct)}" style="width:${ramPct}%"></div></div>
            </div>
            
            <div class="stat-item">
                <div class="stat-label">⬇ Download</div>
                <div class="stat-value blue">${down.toFixed(1)}<span class="unit">Mbps</span></div>
            </div>
            
            <div class="stat-item">
                <div class="stat-label">⬆ Upload</div>
                <div class="stat-value blue">${up.toFixed(1)}<span class="unit">Mbps</span></div>
            </div>
            
            <div class="stat-item full">
                <div class="stat-label">📶 Ping</div>
                <div class="stat-value ${ping < 80 ? 'green' : ping < 150 ? 'yellow' : 'red'}">${ping}<span class="unit">ms</span></div>
            </div>
            
            <div class="stat-item">
                <div class="stat-label">🔋 Battery</div>
                <div class="stat-value ${getColor(batPct)}">${batPct}<span class="unit">%</span></div>
                <div class="stat-bar"><div class="fill ${getFill(batPct)}" style="width:${batPct}%"></div></div>
            </div>
            
            <div class="stat-item">
                <div class="stat-label">💚 Health</div>
                <div class="stat-value pink">${batHealth}</div>
            </div>
        </div>
    </div>
    `;
}

// ============================================================
// RENDER: HARDWARE
// ============================================================
function renderHardware(data) {
    // CPU
    const cpu = data.cpu || {};
    const cpuName = safeStr(cpu.name);
    const cpuBrand = safeStr(cpu.brand);
    const cpuCores = cpu.cores || 0;
    const cpuThreads = cpu.threads || 0;
    const cpuClock = cpu.base_clock || 0;
    const cpuCache = safeStr(cpu.cache);
    const cpuArch = safeStr(cpu.architecture);
    
    // GPU
    const gpu = data.gpu || {};
    const gpuName = safeStr(gpu.name);
    const gpuVendor = safeStr(gpu.vendor);
    const gpuMemory = safeStr(gpu.memory);
    const gpuDriver = safeStr(gpu.driver);
    
    // RAM
    const ram = data.ram || {};
    const ramSize = safeStr(ram.size);
    const ramType = safeStr(ram.type);
    const ramSpeed = ram.speed || 0;
    const ramBrand = safeStr(ram.brand);
    const ramForm = safeStr(ram.form_factor);
    const ramSlots = ram.slots || 0;
    
    // Storage
    const disks = data.disk || [];
    let diskHtml = '';
    if (disks.length > 0) {
        diskHtml = `<div class="hw-disk-list">`;
        disks.forEach(d => {
            const name = d.name || 'Disk';
            const total = d.total || 0;
            const used = d.used || 0;
            const pct = d.percent || 0;
            const type = d.type || 'Unknown';
            const fillClass = pct > 85 ? 'fill-red' : pct > 70 ? 'fill-yellow' : 'fill-green';
            diskHtml += `
                <div class="hw-disk-item">
                    <span class="hw-disk-name">${name}</span>
                    <div class="hw-disk-bar-wrap">
                        <div class="hw-disk-bar">
                            <div class="fill ${fillClass}" style="width:${pct}%"></div>
                        </div>
                        <span class="hw-disk-info">${used}GB/${total}GB</span>
                    </div>
                    <span class="hw-disk-detail">${type}</span>
                </div>
            `;
        });
        diskHtml += `</div>`;
    } else {
        diskHtml = `<div style="color:var(--text-muted);font-size:12px;">No disk information available</div>`;
    }
    
    // System
    const sys = data.system || {};
    const sysOS = safeStr(sys.os);
    const sysHost = safeStr(sys.hostname);
    const sysArch = safeStr(sys.arch);
    const sysKernel = safeStr(sys.kernel);

    return `
    <div class="card">
        <div class="card-title">
            💻 Hardware Information
            <span class="badge-count">${sysHost !== '—' ? sysHost : 'System'}</span>
        </div>
        
        <div class="hw-container">
            
            <!-- CPU -->
            <div class="hw-group">
                <div class="hw-group-header">
                    <div class="hw-group-icon">🖥</div>
                    <div class="hw-group-title">Processor</div>
                    <span class="hw-group-tag">CPU</span>
                </div>
                <div class="hw-detail-row">
                    <span class="hw-detail-label">Model</span>
                    <span class="hw-detail-value">${cpuName}</span>
                </div>
                ${cpuBrand !== '—' ? `
                <div class="hw-detail-row">
                    <span class="hw-detail-label">Brand</span>
                    <span class="hw-detail-value">${cpuBrand}</span>
                </div>` : ''}
                <div class="hw-detail-row">
                    <span class="hw-detail-label">Cores</span>
                    <span class="hw-detail-value">${cpuCores}</span>
                </div>
                <div class="hw-detail-row">
                    <span class="hw-detail-label">Threads</span>
                    <span class="hw-detail-value">${cpuThreads}</span>
                </div>
                <div class="hw-detail-row">
                    <span class="hw-detail-label">Base Clock</span>
                    <span class="hw-detail-value">${cpuClock > 0 ? cpuClock + ' GHz' : '—'}</span>
                </div>
                ${cpuCache !== '—' ? `
                <div class="hw-detail-row">
                    <span class="hw-detail-label">Cache</span>
                    <span class="hw-detail-value">${cpuCache}</span>
                </div>` : ''}
                ${cpuArch !== '—' ? `
                <div class="hw-detail-row">
                    <span class="hw-detail-label">Architecture</span>
                    <span class="hw-detail-value">${cpuArch}</span>
                </div>` : ''}
            </div>
            
            <!-- GPU -->
            <div class="hw-group">
                <div class="hw-group-header">
                    <div class="hw-group-icon">🎮</div>
                    <div class="hw-group-title">Graphics</div>
                    <span class="hw-group-tag">GPU</span>
                </div>
                <div class="hw-detail-row">
                    <span class="hw-detail-label">Model</span>
                    <span class="hw-detail-value">${gpuName}</span>
                </div>
                ${gpuVendor !== '—' ? `
                <div class="hw-detail-row">
                    <span class="hw-detail-label">Vendor</span>
                    <span class="hw-detail-value">${gpuVendor}</span>
                </div>` : ''}
                <div class="hw-detail-row">
                    <span class="hw-detail-label">VRAM</span>
                    <span class="hw-detail-value">${gpuMemory}</span>
                </div>
                ${gpuDriver !== '—' ? `
                <div class="hw-detail-row">
                    <span class="hw-detail-label">Driver</span>
                    <span class="hw-detail-value">${gpuDriver}</span>
                </div>` : ''}
            </div>
            
            <!-- RAM -->
            <div class="hw-group">
                <div class="hw-group-header">
                    <div class="hw-group-icon">🧠</div>
                    <div class="hw-group-title">Memory</div>
                    <span class="hw-group-tag">RAM</span>
                </div>
                <div class="hw-detail-row">
                    <span class="hw-detail-label">Total Size</span>
                    <span class="hw-detail-value">${ramSize}</span>
                </div>
                ${ramType !== '—' ? `
                <div class="hw-detail-row">
                    <span class="hw-detail-label">Type</span>
                    <span class="hw-detail-value">${ramType}</span>
                </div>` : ''}
                ${ramSpeed > 0 ? `
                <div class="hw-detail-row">
                    <span class="hw-detail-label">Speed</span>
                    <span class="hw-detail-value">${ramSpeed} MHz</span>
                </div>` : ''}
                ${ramBrand !== '—' ? `
                <div class="hw-detail-row">
                    <span class="hw-detail-label">Brand</span>
                    <span class="hw-detail-value">${ramBrand}</span>
                </div>` : ''}
                ${ramForm !== '—' ? `
                <div class="hw-detail-row">
                    <span class="hw-detail-label">Form Factor</span>
                    <span class="hw-detail-value">${ramForm}</span>
                </div>` : ''}
                ${ramSlots > 0 ? `
                <div class="hw-detail-row">
                    <span class="hw-detail-label">Slots</span>
                    <span class="hw-detail-value">${ramSlots}</span>
                </div>` : ''}
            </div>
            
            <!-- Storage -->
            <div class="hw-group">
                <div class="hw-group-header">
                    <div class="hw-group-icon">💾</div>
                    <div class="hw-group-title">Storage</div>
                    <span class="hw-group-tag">${disks.length} Disk${disks.length > 1 ? 's' : ''}</span>
                </div>
                ${diskHtml}
            </div>
            
            <!-- System -->
            <div class="hw-group">
                <div class="hw-group-header">
                    <div class="hw-group-icon">🪟</div>
                    <div class="hw-group-title">System</div>
                    <span class="hw-group-tag">OS</span>
                </div>
                <div class="hw-detail-row">
                    <span class="hw-detail-label">Operating System</span>
                    <span class="hw-detail-value">${sysOS}</span>
                </div>
                <div class="hw-detail-row">
                    <span class="hw-detail-label">Hostname</span>
                    <span class="hw-detail-value">${sysHost}</span>
                </div>
                <div class="hw-detail-row">
                    <span class="hw-detail-label">Architecture</span>
                    <span class="hw-detail-value">${sysArch}</span>
                </div>
                ${sysKernel !== '—' ? `
                <div class="hw-detail-row">
                    <span class="hw-detail-label">Kernel</span>
                    <span class="hw-detail-value">${sysKernel}</span>
                </div>` : ''}
            </div>
            
        </div>
    </div>
    `;
}

// ============================================================
// RENDER: OFFLINE
// ============================================================
function renderOffline() {
    return `
    <div class="card">
        <div class="offline">
            <span class="icon">📡</span>
            <h3>Connection Lost</h3>
            <p>Make sure the desktop app is running<br>and both devices are on the same network.</p>
        </div>
    </div>
    `;
}

// ============================================================
// LOAD DATA
// ============================================================
async function loadData() {
    const endpoint = currentView === 'hardware' ? '/hardware' : '/stats';
    
    try {
        const res = await fetch(endpoint);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        
        statusEl.className = 'status online';
        statusText.textContent = 'Online';
        
        content.innerHTML = currentView === 'hardware' 
            ? renderHardware(data) 
            : renderStats(data);
            
    } catch (e) {
        statusEl.className = 'status offline';
        statusText.textContent = 'Offline';
        content.innerHTML = renderOffline();
    }
}

// ============================================================
// NAV
// ============================================================
navBtns.forEach(btn => {
    btn.addEventListener('click', () => {
        const view = btn.dataset.view;
        if (view === currentView) return;
        
        currentView = view;
        
        navBtns.forEach(b => {
            b.className = 'nav-btn';
        });
        
        btn.className = 'nav-btn active';
        if (view === 'stats') btn.classList.add('active-stats');
        else btn.classList.add('active-hardware');
        
        loadData();
    });
});

// ============================================================
// INIT
// ============================================================
loadData();
setInterval(loadData, 1000);
</script>
</body>
</html>
